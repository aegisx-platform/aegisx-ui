<span [class]="badgeClasses" [style]="customStyles">
  <!-- Dot indicator -->
  @if (dot) {
    <span class="dot"></span>
  }

  <!-- Square indicator -->
  @if (square) {
    <span class="square"></span>
  }

  <!-- Icon leading -->
  @if (icon && iconPosition === 'leading') {
    <mat-icon>{{ icon }}</mat-icon>
  }

  <!-- Label content (hidden in icon-only mode) -->
  @if (!iconOnly) {
    <span class="badge-label">
      <ng-content></ng-content>
    </span>
  }

  <!-- Counter -->
  @if (counter !== undefined) {
    <span class="badge-count">{{ counter }}</span>
  }

  <!-- Icon trailing -->
  @if (icon && iconPosition === 'trailing') {
    <mat-icon>{{ icon }}</mat-icon>
  }

  <!-- Remove button -->
  @if (removable) {
    <button class="badge-remove" type="button" (click)="onRemoveClick($event)">
      <mat-icon>close</mat-icon>
    </button>
  }
</span>
