<div
  class="ax-date-picker-container"
  [class.ax-date-picker-container-inline]="displayMode === 'inline'"
>
  <!-- Label -->
  @if (label) {
    <label class="ax-date-picker-label">
      {{ label }}
      @if (required) {
        <span class="ax-date-picker-required">*</span>
      }
    </label>
  }

  <!-- Input Wrapper (only shown in 'input' mode) -->
  @if (displayMode === 'input') {
    <div
      [class]="wrapperClasses"
      (click)="toggleDropdown()"
      (keydown)="onInputKeydown($event)"
      tabindex="0"
      role="combobox"
      [attr.aria-expanded]="isOpen"
      aria-haspopup="dialog"
      aria-controls="datepicker-dropdown"
      [attr.aria-describedby]="displayMessage ? messageId : null"
    >
      <!-- Display Value -->
      <div class="ax-date-picker-display">
        @if (displayValue) {
          <span class="ax-date-picker-value">{{ displayValue }}</span>
        } @else {
          <span class="ax-date-picker-placeholder">{{ placeholder }}</span>
        }
      </div>

      <!-- Icons -->
      @if (!readonly) {
        <div class="ax-date-picker-icons">
          <!-- Clear Button -->
          @if (displayValue && !disabled) {
            <button
              type="button"
              class="ax-date-picker-clear"
              (click)="clearValue(); $event.stopPropagation()"
              tabindex="-1"
              aria-label="Clear date"
            >
              <svg
                width="16"
                height="16"
                viewBox="0 0 16 16"
                fill="none"
                aria-hidden="true"
              >
                <path
                  d="M12 4L4 12M4 4L12 12"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
            </button>
          }

          <!-- Calendar Icon -->
          <div class="ax-date-picker-icon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path
                d="M6 2V4M14 2V4M3 8H17M5 4H15C16.1046 4 17 4.89543 17 6V16C17 17.1046 16.1046 18 15 18H5C3.89543 18 3 17.1046 3 16V6C3 4.89543 3.89543 4 5 4Z"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>
        </div>
      }
    </div>
  }

  <!-- Calendar (Dropdown in 'input' mode, Always visible in 'inline' mode) -->
  @if (isOpen || displayMode === 'inline') {
    <div
      id="datepicker-dropdown"
      class="ax-date-picker-dropdown"
      [class.ax-date-picker-dropdown-inline]="displayMode === 'inline'"
      (keydown)="onCalendarKeydown($event)"
      [attr.role]="displayMode === 'inline' ? 'region' : 'dialog'"
      [attr.aria-modal]="displayMode === 'inline' ? null : true"
      [attr.aria-label]="'Choose date' + (label ? ' for ' + label : '')"
      [attr.tabindex]="displayMode === 'inline' ? 0 : -1"
      cdkTrapFocus
      [cdkTrapFocusAutoCapture]="displayMode !== 'inline'"
    >
      <!-- Header -->
      <ax-calendar-header
        [viewMode]="viewMode"
        [currentMonthYear]="currentMonthYear"
        [yearRangeStart]="years[0]"
        [yearRangeEnd]="years[11]"
        (prevClick)="onHeaderPrev()"
        (nextClick)="onHeaderNext()"
        (viewModeToggle)="toggleViewMode()"
      />

      <!-- Calendar Grid (Day / Month / Year views) -->
      <ax-calendar-grid
        [viewMode]="viewMode"
        [calendarDays]="calendarDays"
        [weekDays]="weekDays"
        [months]="months"
        [years]="years"
        [selectedMonth]="currentMonth.getMonth()"
        [selectedYear]="currentMonth.getFullYear()"
        [locale]="locale"
        [calendar]="calendar"
        (dateSelect)="selectDate($event)"
        (dateHover)="onDayHover($event)"
        (calendarMouseLeave)="onCalendarMouseLeave()"
        (monthSelect)="selectMonth($event)"
        (yearSelect)="selectYear($event)"
      />

      <!-- Action Buttons Footer -->
      @if (showActionButtons) {
        <div class="ax-date-picker-footer">
          <button
            type="button"
            class="ax-date-picker-action-btn ax-date-picker-action-btn-secondary"
            (click)="clearValue(); $event.stopPropagation()"
            aria-label="Clear selection"
          >
            Clear
          </button>
          <button
            type="button"
            class="ax-date-picker-action-btn ax-date-picker-action-btn-primary"
            (click)="selectToday(); $event.stopPropagation()"
            aria-label="Select today's date"
          >
            Today
          </button>
        </div>
      }
    </div>
  }

  <!-- Helper Text / Error Message -->
  @if (displayMessage) {
    <div [id]="messageId" class="ax-date-picker-message" [attr.role]="errorMessage ? 'alert' : null">
      {{ displayMessage }}
    </div>
  }
</div>
